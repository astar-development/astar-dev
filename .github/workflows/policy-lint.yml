name: Policy Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  
jobs:
  validate-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Run policy validator
        run: |
          node scripts/validate-policy.js
